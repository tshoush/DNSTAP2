# Prometheus config for the Docker stack. Scrapes the DNS-collector exporter
# (dnscollector_* on :9599) over the compose network, plus itself.
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: lab
    monitor: dnstap2

scrape_configs:
  - job_name: dnscollector
    metrics_path: /metrics
    static_configs:
      - targets: ["dnscollector:9599"]
        labels:
          source: dnscollector

  - job_name: prometheus_self
    static_configs:
      - targets: ["localhost:9090"]
