# Grafana datasources for the all-in-one container — Prometheus and Loki are on
# localhost. UIDs match the dashboard JSON so it binds without edits.
apiVersion: 1
datasources:
  - name: Prometheus
    uid: prometheus
    type: prometheus
    access: proxy
    url: http://localhost:9090
    isDefault: true
  - name: Loki
    uid: loki
    type: loki
    access: proxy
    url: http://localhost:3100
