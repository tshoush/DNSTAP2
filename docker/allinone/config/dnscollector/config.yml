# DNS-collector — dnstap receiver for the all-in-one container (pipelines, v2.x).
# Loki is on localhost here (everything shares the container's loopback).
global:
  trace:
    verbose: false
  server-identity: "dnscollector"
  worker:
    interval-monitor: 10

pipelines:
  # ---- input: dnstap frame-streams from NIOS / InfoBlox ----
  - name: tap
    dnstap:
      listen-ip: 0.0.0.0
      listen-port: 6001
    transforms:
      normalize:
        qname-lowercase: true
      # Pair each response with its query and stamp dnstap.latency (seconds).
      # Cache hits answer in <2ms, so latency is the cache-hit proxy when the
      # DNS server only emits client-side dnstap (NIOS exposes only
      # enable_dnstap_queries/responses — no RESOLVER_* events).
      latency:
        enable: true
        measure-latency: true
        unanswered-queries: true
        queries-timeout: 5
    routing-policy:
      forward: [ metrics, lokiout, fileout ]   # append niosfile (UF) or splunkout for a Splunk feed
      dropped: [ ]

  # ---- output: Prometheus metrics (dnscollector_* on :9599) ----
  - name: metrics
    prometheus:
      listen-ip: 0.0.0.0
      listen-port: 9599
      prometheus-prefix: "dnscollector"
      basic-auth-enable: false

  # ---- output: Grafana Loki (same container, localhost) ----
  - name: lokiout
    lokiclient:
      server-url: "http://localhost:3100/loki/api/v1/push"
      job-name: "dnscollector"
      mode: "flat-json"

  # ---- output: local JSONL archive ----
  - name: fileout
    logfile:
      file-path: "/var/log/dnscollector/dnscollector-events.jsonl"
      mode: flat-json
      max-size: 100
      max-files: 5

  # ---- output (optional): NIOS-style lines for a Splunk Universal Forwarder ----
  # THE route into an S2S-only indexer (e.g. the Infoblox Data Connector :8005):
  # raw TCP/syslog text is dropped there — only a forwarder speaks S2S. DNS-
  # collector CAN emit NIOS named-query-log lookalike lines ({...} are
  # text-format literals); a UF monitors the file and ships them to index=mi_dhcp
  # as source=dnstap:dnscollector. In Docker, mount this file out and run a UF
  # (sidecar/host) — see scripts/install_splunk_uf.sh and the QUICKSTART POC
  # section. (Bare-metal installs get this via NIOS_LOG_PATH automatically.)
  # Enable: uncomment and append niosfile to routing-policy.forward above.
  # - name: niosfile
  #   logfile:
  #     file-path: "/var/log/dnscollector/nios.log"
  #     mode: text
  #     text-format: 'timestamp-rfc3339ns responseip {named[0]:} {client} queryip queryport {query:} qname {IN} qtype operation rcode'
  #     max-size: 50
  #     max-files: 3

  # ---- output (optional): Splunk flat-json feed (raw TCP input) ----
  # One JSON event per line to a Splunk raw TCP input; pair with a line-broken
  # sourcetype like dnscollector:json (SHOULD_LINEMERGE=false, KV_MODE=json).
  # Enable: uncomment and append splunkout to routing-policy.forward above.
  # - name: splunkout
  #   tcpclient:
  #     transport: tcp
  #     remote-address: "host.docker.internal"   # or your Splunk host
  #     remote-port: 1514
  #     connect-timeout: 5
  #     retry-interval: 10
  #     flush-interval: 2
  #     mode: flat-json
