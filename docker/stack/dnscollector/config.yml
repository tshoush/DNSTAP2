# DNS-collector — dnstap receiver for the Docker stack (pipelines model, v2.x).
# Adapted from scripts/install_dnscollector_receiver.sh: container hostnames are
# used for Loki, and the syslog/SIEM output is dropped (no syslog server in the
# stack). Add it back under routing-policy.forward if you wire a SIEM in.
global:
  trace:
    verbose: false
  server-identity: "dnscollector"
  worker:
    interval-monitor: 10

pipelines:
  # ---- input: dnstap frame-streams from NIOS / InfoBlox ----
  - name: tap
    dnstap:
      listen-ip: 0.0.0.0
      listen-port: 6001
    transforms:
      normalize:
        qname-lowercase: true
      # Pair each response with its query and stamp dnstap.latency (seconds).
      # Cache hits answer in <2ms, so latency is the cache-hit proxy when the
      # DNS server only emits client-side dnstap (NIOS exposes only
      # enable_dnstap_queries/responses — no RESOLVER_* events).
      latency:
        enable: true
        measure-latency: true
        unanswered-queries: true
        queries-timeout: 5
    routing-policy:
      forward: [ metrics, lokiout, fileout ]   # append splunkout to enable the Splunk feed
      dropped: [ ]

  # ---- output: Prometheus metrics (dnscollector_* on :9599) ----
  - name: metrics
    prometheus:
      listen-ip: 0.0.0.0
      listen-port: 9599
      prometheus-prefix: "dnscollector"
      basic-auth-enable: false

  # ---- output: Grafana Loki (job=dnscollector) ----
  - name: lokiout
    lokiclient:
      server-url: "http://loki:3100/loki/api/v1/push"
      job-name: "dnscollector"
      mode: "flat-json"

  # ---- output: local JSONL archive (persisted in the dnscollector-data volume) ----
  - name: fileout
    logfile:
      file-path: "/var/log/dnscollector/dnscollector-events.jsonl"
      mode: flat-json
      max-size: 100
      max-files: 5

  # ---- output (optional): Splunk flat-json feed ----
  # One JSON event per line to a Splunk raw TCP input; pair with a line-broken
  # sourcetype like dnscollector:json (SHOULD_LINEMERGE=false, KV_MODE=json).
  # For NIOS-style syslog lines in Splunk use Vector's SPLUNK_HEC_* feed instead
  # (scripts/install_dnstap_receiver.sh) — see QUICKSTART "Splunk: two feeds".
  # Enable: uncomment and append splunkout to routing-policy.forward above.
  # - name: splunkout
  #   tcpclient:
  #     transport: tcp
  #     remote-address: "host.docker.internal"   # or your Splunk host
  #     remote-port: 1514
  #     connect-timeout: 5
  #     retry-interval: 10
  #     flush-interval: 2
  #     mode: flat-json
