# DNSTAP2 observability stack — DNS-collector + Prometheus + Loki + Grafana.
#
# Stands up the full receiver+monitoring stack in containers. Everything EXCEPT
# InfoBlox and the DNS server, which stay external and dial dnstap frames INTO
# this stack on port 6001 (set the NIOS member's dnstap receiver to <host>:6001).
#
# This mirrors the native installers (scripts/install_dnscollector_receiver.sh,
# install_prometheus.*, install_grafana.sh, install_loki.sh) but as containers,
# so the host only needs Docker + Compose — no glibc/systemd concerns.
#
#   docker compose up -d --build
#   # Grafana:    http://<host>:3000  (admin/admin, anon viewer enabled)
#   # Prometheus: http://<host>:9090
#   # dnstap in:  <host>:6001         <- point InfoBlox here
#
name: dnstap2-stack

services:
  # ---- dnstap receiver (dmachard/DNS-collector) ----
  dnscollector:
    build:
      context: .
      dockerfile: Dockerfile.dnscollector
      args:
        DNSCOL_VERSION: "2.2.3"
    image: dnstap2/dnscollector:2.2.3
    container_name: dnstap2-dnscollector
    restart: unless-stopped
    ports:
      - "6001:6001"      # dnstap frame-streams from InfoBlox/NIOS  <-- the inbound port
      - "9599:9599"      # Prometheus metrics (exposed for debugging; Prometheus scrapes internally)
    volumes:
      - ./dnscollector/config.yml:/etc/dnscollector/config.yml:ro
      - dnscollector-data:/var/log/dnscollector
    networks: [dnstap]

  # ---- metrics store ----
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: dnstap2-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks: [dnstap]
    depends_on: [dnscollector]

  # ---- log store (DNS-collector ships events here as flat-json) ----
  loki:
    image: grafana/loki:2.9.8
    container_name: dnstap2-loki
    restart: unless-stopped
    command: ["-config.file=/etc/loki/local-config.yaml"]
    ports:
      - "3100:3100"
    volumes:
      - loki-data:/loki
    networks: [dnstap]

  # ---- dashboards ----
  grafana:
    image: grafana/grafana:10.4.2
    container_name: dnstap2-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    networks: [dnstap]
    depends_on: [prometheus, loki]

  # ---- Splunk Enterprise (lab) — receives NIOS-format syslog via HEC ----
  splunk:
    image: splunk/splunk:9.3
    container_name: dnstap2-splunk
    # Splunk publishes amd64 only; on Apple Silicon run it under emulation.
    platform: linux/amd64
    restart: unless-stopped
    environment:
      SPLUNK_GENERAL_TERMS: "--accept-sgt-current-at-splunk-com"
      SPLUNK_START_ARGS: "--accept-license"
      SPLUNK_PASSWORD: "${SPLUNK_PASSWORD:?set SPLUNK_PASSWORD in docker/stack/.env}"
      SPLUNK_HEC_TOKEN: "${SPLUNK_HEC_TOKEN:?set SPLUNK_HEC_TOKEN in docker/stack/.env}"
    ports:
      - "8000:8000"      # Splunk Web UI  (admin / $SPLUNK_PASSWORD)
      - "8088:8088"      # HTTP Event Collector (Vector ships here)
      - "5514:5514"      # raw TCP input -> index mi_dhcp (no auth; .50 ships here)
      - "5514:5514/udp"  # raw UDP/syslog input -> index mi_dhcp (no auth)
    volumes:
      - splunk-var:/opt/splunk/var
      - splunk-etc:/opt/splunk/etc
    networks: [dnstap]
    healthcheck:
      test: ["CMD", "curl", "-skf", "https://localhost:8088/services/collector/health"]
      interval: 15s
      timeout: 5s
      retries: 30
      start_period: 120s

  # ---- Vector — dnstap receiver that emits the InfoBlox/NIOS syslog line ----
  # Receives dnstap on :6000 (point NIOS here, or use scripts/dnstap_synth.py),
  # renders each event as the exact NIOS query-log line, and ships it to Splunk
  # HEC as sourcetype infoblox:dns. Pinned to 0.39.x for VRL parity with the config.
  vector:
    image: timberio/vector:0.39.0-debian
    container_name: dnstap2-vector
    restart: unless-stopped
    command: ["--config", "/etc/vector/vector.toml"]
    environment:
      SPLUNK_HEC_TOKEN: "${SPLUNK_HEC_TOKEN:?set SPLUNK_HEC_TOKEN in docker/stack/.env}"
    ports:
      - "6000:6000"      # dnstap frame-streams in (NIOS or synthetic)
      - "9598:9598"      # Prometheus metrics (dnstap_*)
    volumes:
      - ./vector/vector.toml:/etc/vector/vector.toml:ro
      - vector-data:/var/lib/vector
    networks: [dnstap]
    depends_on:
      splunk:
        condition: service_healthy

volumes:
  dnscollector-data:
  prometheus-data:
  loki-data:
  grafana-data:
  splunk-var:
  splunk-etc:
  vector-data:

networks:
  dnstap:
    driver: bridge
